services:

  # ── Main likeVercel app ───────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: likevercel
    container_name: likevercel
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3001}"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET}"
      JWT_EXPIRES_IN: "${JWT_EXPIRES_IN:-15m}"
      JWT_REFRESH_EXPIRES_IN: "${JWT_REFRESH_EXPIRES_IN:-7d}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
      DATABASE_URL: "file:/app/backend/prisma/data/prod.db"
      ANALYTICS_DATABASE_URL: "file:/app/backend/prisma/data/analytics.db"
      ANALYTICS_API_URL: "${ANALYTICS_API_URL}"
      ANALYTICS_API_SECRET: "${ANALYTICS_API_SECRET}"
    volumes:
      - likevercel_db:/app/backend/prisma/data

volumes:
  likevercel_db:
